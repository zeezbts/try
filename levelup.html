<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arise - Solo Leveling</title>
    <style>
        :root { --system-blue: #00d4ff; --text-gold: #ffd700; --bg-dark: #0a0a0b; --monarch-purple: #a020f0; }
        
        body { 
            background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
            position: fixed; width: 100%;
        }

        /* --- BACKGROUND IMAGE --- */
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.7)), 
                              url('https://pinimg.com');
            background-size: cover; background-position: center;
            z-index: -2;
            transform: translate3d(0, 0, 0);
            animation: manaSurge 6s infinite alternate ease-in-out;
        }

        @keyframes manaSurge {
            0% { filter: brightness(0.6) saturate(1); }
            100% { filter: brightness(1) saturate(1.4); }
        }

        /* --- ARISE INTRO SEQUENCE --- */
        #arise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            animation: fadeOutOverlay 0.5s ease-in 2.5s forwards;
        }

        .arise-text {
            font-size: clamp(3.5rem, 15vw, 8rem);
            color: var(--monarch-purple);
            text-shadow: 0 0 20px var(--monarch-purple), 0 0 50px #4b0082;
            letter-spacing: 15px; font-weight: 900;
            animation: ariseEffect 2.5s ease-out forwards;
        }

        @keyframes ariseEffect {
            0% { transform: scale(0.5); opacity: 0; letter-spacing: 40px; filter: blur(10px); }
            20% { opacity: 1; filter: blur(0px); }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        @keyframes fadeOutOverlay { to { visibility: hidden; opacity: 0; } }

        /* --- MAIN UI CONTAINER --- */
        .rank-up-container { 
            text-align: center; z-index: 5;
            background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(10px);
            padding: 40px 20px; border: 1px solid var(--system-blue);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            width: 85%; max-width: 420px;
            clip-path: polygon(0 15px, 15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
            opacity: 0; /* Hidden until Arise finishes */
            animation: revealUI 1s ease-out 2.8s forwards;
        }

        @keyframes revealUI { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .level-number { font-size: 7rem; color: var(--text-gold); text-shadow: 0 0 40px var(--text-gold); margin: 5px 0; font-weight: 900; }
        
        button { 
            background: rgba(0, 212, 255, 0.1); border: 1px solid var(--system-blue); 
            color: var(--system-blue); padding: 18px; cursor: pointer; 
            text-transform: uppercase; margin-top: 20px; font-weight: bold;
            letter-spacing: 2px; transition: 0.3s; width: 100%;
        }
        button:hover { background: var(--system-blue); color: black; box-shadow: 0 0 20px var(--system-blue); }

        #portal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 10001; flex-direction: column; justify-content: center; align-items: center; }
        .portal-spin { width: 50px; height: 50px; border: 3px solid var(--system-blue); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- 1. Background -->
    <div class="bg-image"></div>

    <!-- 2. Arise Intro -->
    <div id="arise-overlay">
        <h1 class="arise-text">ARISE</h1>
    </div>

    <!-- 3. Level Up Content -->
    <div class="rank-up-container">
        <p style="color: var(--system-blue); letter-spacing: 3px; margin: 0; font-size: 0.8rem;">EVOLUTION COMPLETE</p>
        <div class="level-number" id="display-new-level">1</div>
        <h2 style="color: white; letter-spacing: 2px; font-size: 1rem; margin-bottom: 20px;">RANK INCREASED</h2>
        <button onclick="next()">GO TO NEXT DONGEN</button>
    </div>

    <!-- 4. Loading Overlay -->
    <div id="portal-overlay">
        <div class="portal-spin"></div>
        <p style="color: var(--system-blue); margin-top: 20px; letter-spacing: 2px;">RE-SYNCING...</p>
    </div>

    <script>
        const hunter = localStorage.getItem("soloUser");
        
        window.onload = function() {
            if (!hunter) { window.location.href = "index.html"; return; }
            const level = localStorage.getItem("userLevel_" + hunter.toLowerCase()) || 1;
            document.getElementById('display-new-level').innerText = level;
        };

        function next() {
            document.getElementById('portal-overlay').style.display = 'flex';
            setTimeout(() => { window.location.href = "workout.html"; }, 1200);
        }
    </script>
</body>
</html>
