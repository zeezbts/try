            background-size: cover; background-position: center;
            z-index: -2;
            /* Using hardware acceleration to lock position */
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            animation: manaPulse 8s infinite alternate ease-in-out;
        }

        @keyframes manaPulse {
            0% { filter: brightness(0.8) contrast(1); opacity: 0.8; }
            100% { filter: brightness(1.2) contrast(1.1); opacity: 1; }
        }

        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://transparenttextures.com');
            opacity: 0.2; z-index: -1; animation: drift 60s linear infinite;
            pointer-events: none;
        }

        /* --- LOCKED UI WINDOW --- */
        .system-window, #login-screen { 
            position: relative; width: 85%; max-width: 420px; 
            border: 2px solid var(--system-blue); padding: 40px 20px; 
            background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(12px);
            clip-path: polygon(0 15px, 15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
            text-align: center; box-shadow: var(--glow);
            /* Prevents sub-pixel jitter */
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }

        #login-screen { display: flex; flex-direction: column; align-items: center; }
        #main-ui { display: none; }

        /* --- UI ELEMENTS --- */
        h1 { font-size: 1.6rem; letter-spacing: 3px; margin-bottom: 20px; color: var(--system-blue); }
        .lvl-text { font-size: 3rem; color: var(--text-gold); margin: 5px 0; text-shadow: 0 0 15px var(--text-gold); }
        
        #display-rank { 
            font-weight: 900; font-size: 3.5rem; 
            display: block; margin: 10px 0;
            line-height: 1; transition: 0.5s ease;
        }

        input { 
            background: rgba(0, 212, 255, 0.1); border: 1px solid var(--system-blue); 
            color: white; padding: 15px; margin: 10px 0; width: 90%; max-width: 300px;
            text-align: center; outline: none; font-size: 16px; 
        }

        button { 
            background: rgba(0, 212, 255, 0.05); border: 1px solid var(--system-blue); 
            color: var(--system-blue); padding: 15px 30px; width: 90%; max-width: 300px;
            cursor: pointer; text-transform: uppercase; font-weight: bold; 
            letter-spacing: 2px; transition: 0.4s; margin-top: 10px;
        }

        button:hover { background: var(--system-blue); color: black; box-shadow: 0 0 30px var(--system-blue); }

        .logout-link { position: absolute; top: 12px; right: 15px; color: #ff4d4d; font-size: 0.7rem; background: none; border: none; text-decoration: underline; cursor: pointer; }

        @keyframes drift { from { background-position: 0 0; } to { background-position: 500px 1000px; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- GATE OVERLAY --- */
        #gate-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .portal { width: 60px; height: 60px; border: 4px solid var(--system-blue); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="particles"></div>

    <div id="login-screen">
        <h1>SYSTEM ACCESS</h1>
        <input type="text" id="u-name" placeholder="HUNTER NAME">
        <input type="password" id="u-pass" placeholder="SECRET KEY">
        <button onclick="verifyUser()">Verify Identity</button>
    </div>

    <div id="main-ui" class="system-window">
        <button class="logout-link" onclick="logout()">[ Log Out ]</button>
        <p style="color: #888; font-size: 0.8rem; margin: 0; letter-spacing: 2px;">RANK</p>
        <span id="display-rank">E</span>
        <h1 class="lvl-text">LEVEL: <span id="display-level">1</span></h1>
        <h2 id="user-display" style="color: var(--system-blue); margin-bottom: 20px; font-size: 1.1rem;">HUNTER</h2>
        <button onclick="enterGate()">Enter the Gate</button>


        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
    <button onclick="exportSave()" style="font-size: 0.7rem; padding: 10px;">Export Save</button>
    <button onclick="importSave()" style="font-size: 0.7rem; padding: 10px;">Import Save</button>
</div>

    </div>

    <div id="gate-overlay">
        <div class="portal"></div>
        <p style="color: var(--system-blue); margin-top: 20px; letter-spacing: 2px;">SYNCING GATE DATA...</p>
    </div>

    <script>
        window.onload = function() {
            const savedUser = localStorage.getItem("soloUser");
            if (savedUser) { showMainUI(savedUser); }
        };

        function verifyUser() {
            const name = document.getElementById('u-name').value.trim().toLowerCase();
            const pass = document.getElementById('u-pass').value.trim();
            if (name && pass) {
                const passKey = "userPass_" + name;
                const storedPass = localStorage.getItem(passKey);
                if (storedPass === null) {
                    localStorage.setItem(passKey, pass);
                    localStorage.setItem("userLevel_" + name, 1);
                    localStorage.setItem("soloUser", name);
                    showMainUI(name);
                } else if (storedPass === pass) {
                    localStorage.setItem("soloUser", name);
                    showMainUI(name);
                } else { alert("ACCESS DENIED: Wrong Key."); }
            }
        }

        function showMainUI(name) {
            const levelKey = "userLevel_" + name.toLowerCase();
            const currentLevel = parseInt(localStorage.getItem(levelKey)) || 1;

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('user-display').innerText = name.toUpperCase();
            document.getElementById('display-level').innerText = currentLevel;

            let rank = "E"; let color = "#9e9e9e";
            if (currentLevel >= 80) { rank = "S"; color = "#ffd700"; }
            else if (currentLevel >= 60) { rank = "A"; color = "#ff4500"; }
            else if (currentLevel >= 40) { rank = "B"; color = "#a020f0"; }
            else if (currentLevel >= 20) { rank = "C"; color = "#00d4ff"; }
            else if (currentLevel >= 10) { rank = "D"; color = "#32cd32"; }

            const rankEl = document.getElementById('display-rank');
            rankEl.innerText = rank;
            rankEl.style.color = color;
            rankEl.style.textShadow = `0 0 25px ${color}`;
        }

        function enterGate() {
            document.getElementById('gate-overlay').style.display = 'flex';
            setTimeout(() => { window.location.href = "workout.html"; }, 1500);
        }

        function logout() { 
            if(confirm("Disconnect?")) { localStorage.removeItem("soloUser"); location.reload(); } 
        }



        function exportSave() {
    const name = localStorage.getItem("soloUser");
    const lvl = localStorage.getItem("userLevel_" + name);
    const pass = localStorage.getItem("userPass_" + name);
    
    // Create a simple coded string: Name|Level|Password
    const saveString = btoa(`${name}|${lvl}|${pass}`); 
    prompt("COPY THIS SAVE CODE TO YOUR OTHER PHONE:", saveString);
}

function importSave() {
    const code = prompt("PASTE YOUR SAVE CODE HERE:");
    if (!code) return;

    try {
        const decoded = atob(code).split('|'); // Decode the string
        const name = decoded[0];
        const lvl = decoded[1];
        const pass = decoded[2];

        localStorage.setItem("soloUser", name);
        localStorage.setItem("userLevel_" + name, lvl);
        localStorage.setItem("userPass_" + name, pass);
        
        alert("SYNC COMPLETE: System Restarting...");
        location.reload();
    } catch(e) {
        alert("ERROR: Invalid Save Code.");
    }
}

    </script>
</body>
</html>
